<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سندباد AI | Doha Oasis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <div class="brand-block">
          <div class="brand-icon">
            <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="url(#g1)" stroke-width="1.5"/><circle cx="20" cy="20" r="8" fill="url(#g1)"/><defs><linearGradient id="g1" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#c9a66b"/><stop offset="1" stop-color="#1e3a5f"/></linearGradient></defs></svg>
          </div>
          <div>
            <h1 class="brand-name">سندباد <span>AI</span></h1>
            <p class="brand-tag">Executive Intelligence</p>
          </div>
        </div>

        <div class="company-block" id="companyMeta"></div>

        <div class="sidebar-section flex-grow">
          <p class="section-label" id="insightsSectionLabel">رؤى استراتيجية</p>
          <div class="insight-list" id="presetCards"></div>
        </div>

        <div class="sidebar-footer">
          <div class="live-badge"><span class="pulse"></span> <span id="liveBadgeText">متصل بقاعدة البيانات</span></div>
          <p class="source-note">Doha_Oasis_Sindibad_Database.xlsx</p>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="workspace-header">
        <div class="header-text">
          <h2 id="greeting">مرحباً بك في سندباد</h2>
          <p id="subtitle">اسأل أي سؤال — سأحلل البيانات وأعرض لك الأرقام والرسوم.</p>
        </div>
        <div class="header-tools">
          <button class="tool-btn" id="langBtn">EN</button>
          <button class="tool-btn" id="themeBtn" aria-label="Theme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </header>

      <div class="hero-kpi-strip" id="heroKpiRow"></div>

      <div class="workspace-body" id="workspaceBody">
        <div class="empty-state" id="emptyState">
          <div class="empty-visual">
            <div class="orbit"><div class="orbit-core"></div></div>
          </div>
          <h3 id="emptyTitle">مستشارك الاستراتيجي جاهز</h3>
          <p id="emptyDesc">اختر أحد التقارير أدناه، أو اكتب سؤالك في الأسفل.</p>
          <div class="prompt-grid" id="promptGrid"></div>
        </div>

        <div class="chat-feed hidden" id="chatFeed"></div>
      </div>

      <footer class="composer">
        <div class="composer-tags" id="composerTags"></div>
        <div class="composer-box">
          <input type="text" id="queryInput" placeholder="اكتب سؤالك الاستراتيجي هنا..." autocomplete="off" />
          <button class="composer-send" id="sendBtn" aria-label="Send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </footer>
    </main>
  </div>

  <div class="loading hidden" id="loading">
    <div class="loading-inner">
      <div class="loader-ring"></div>
      <p class="loading-title">سندباد يحلل البيانات</p>
      <ul class="loading-steps" id="loadingSteps"></ul>
      <div class="loading-bar"><div class="loading-bar-fill" id="loadingBar"></div></div>
    </div>
  </div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
