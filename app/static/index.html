<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سندباد AI | Doha Oasis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>

  <div class="shell">

    <!-- ── Top header ── -->
    <header class="app-header">
      <div class="header-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="url(#hg)" stroke-width="1.5"/>
            <circle cx="20" cy="20" r="8" fill="url(#hg)"/>
            <defs>
              <linearGradient id="hg" x1="0" y1="0" x2="40" y2="40">
                <stop stop-color="#c9a66b"/>
                <stop offset="1" stop-color="#1e3a5f"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="header-brand-text">
          <h1 class="brand-name">سندباد <span>AI</span></h1>
          <p class="brand-tag">Executive Intelligence</p>
        </div>
      </div>

      <!-- Company meta (chips) -->
      <div class="header-company" id="companyMeta"></div>

      <div class="header-tools">
        <button class="tool-btn" id="langBtn">EN</button>
        <button class="tool-btn icon-btn" id="themeBtn" aria-label="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- ── KPI Strip ── -->
    <div class="hero-kpi-strip" id="heroKpiRow"></div>

    <!-- ── Main workspace ── -->
    <main class="workspace">
      <div class="workspace-body" id="workspaceBody">

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
          <div class="empty-visual">
            <div class="orbit"><div class="orbit-core"></div></div>
          </div>
          <h3 id="emptyTitle">مستشارك الاستراتيجي جاهز</h3>
          <p id="emptyDesc">اختر أحد التقارير أدناه، أو اكتب سؤالك في الأسفل.</p>
          <div class="prompt-grid" id="promptGrid"></div>
        </div>

        <!-- Chat feed -->
        <div class="chat-feed hidden" id="chatFeed"></div>
      </div>

      <!-- ── Composer ── -->
      <footer class="composer">
        <div class="composer-tags" id="composerTags"></div>
        <div class="composer-box">
          <input type="text" id="queryInput" placeholder="اكتب سؤالك الاستراتيجي هنا..." autocomplete="off" />
          <button class="composer-send" id="sendBtn" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </footer>
    </main>

  </div>

  <!-- Hidden sidebar remnants needed by JS -->
  <div style="display:none" aria-hidden="true">
    <div id="presetCards"></div>
    <span id="insightsSectionLabel"></span>
    <span id="liveBadgeText"></span>
  </div>

  <!-- Loading overlay -->
  <div class="loading hidden" id="loading">
    <div class="loading-inner">
      <div class="loader-ring"></div>
      <p class="loading-title">سندباد يحلل البيانات</p>
      <ul class="loading-steps" id="loadingSteps"></ul>
      <div class="loading-bar"><div class="loading-bar-fill" id="loadingBar"></div></div>
    </div>
  </div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
