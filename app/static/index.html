<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سندباد AI | Doha Oasis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="shell">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <!-- Brand header — pinned top -->
        <div class="brand-block">
          <button class="sidebar-close" id="sidebarClose" aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
          <div class="brand-icon">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" stroke="url(#g1)" stroke-width="1.5"/>
              <circle cx="20" cy="20" r="8" fill="url(#g1)"/>
              <defs>
                <linearGradient id="g1" x1="0" y1="0" x2="40" y2="40">
                  <stop stop-color="#c9a66b"/>
                  <stop offset="1" stop-color="#1e3a5f"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="brand-text">
            <h1 class="brand-name">سندباد <span>AI</span></h1>
            <p class="brand-tag">Executive Intelligence</p>
          </div>
        </div>

        <!-- Scrollable content area -->
        <div class="sidebar-scroll">

          <div class="company-block" id="companyMeta"></div>

          <div class="sidebar-section flex-grow">
            <p class="section-label" id="insightsSectionLabel">رؤى استراتيجية</p>
            <div class="insight-list" id="presetCards"></div>
          </div>

        </div>

        <!-- Footer — pinned bottom -->
        <div class="sidebar-footer">
          <div class="live-badge">
            <span class="pulse"></span>
            <span id="liveBadgeText">متصل بقاعدة البيانات</span>
          </div>
          <p class="source-note">Doha_Oasis_Sindibad_Database.xlsx</p>
        </div>

      </div>
    </aside>

    <main class="workspace">

      <header class="workspace-header">
        <div class="header-start">
          <button class="menu-toggle" id="menuToggle" aria-label="Menu">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div class="header-text">
            <h2 id="greeting">مرحباً بك في سندباد</h2>
            <p id="subtitle">اسأل أي سؤال — سأحلل البيانات وأعرض لك الأرقام والرسوم.</p>
          </div>
        </div>
        <div class="header-tools">
          <button class="tool-btn" id="langBtn">EN</button>
          <button class="tool-btn icon-btn notif-btn" aria-label="Notifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </button>
          <button class="tool-btn icon-btn" id="themeBtn" aria-label="Toggle theme">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </header>

      <div class="hero-kpi-strip" id="heroKpiRow"></div>

      <div class="workspace-body" id="workspaceBody">
        <div class="empty-state" id="emptyState">
          <div class="empty-visual">
            <div class="orbit"><div class="orbit-core"></div></div>
          </div>
          <h3 id="emptyTitle">مستشارك الاستراتيجي جاهز</h3>
          <p id="emptyDesc">اختر أحد التقارير أدناه، أو اكتب سؤالك في الأسفل.</p>
          <div class="prompt-grid" id="promptGrid"></div>
        </div>

        <div class="chat-feed hidden" id="chatFeed"></div>
      </div>

      <footer class="composer">
        <div class="composer-tags" id="composerTags"></div>
        <div class="composer-box">
          <input type="text" id="queryInput" placeholder="اكتب سؤالك الاستراتيجي هنا..." autocomplete="off" />
          <button class="composer-send" id="sendBtn" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </footer>

    </main>

    <!-- ── Bottom navigation (mobile only) ── -->
    <nav class="bottom-nav">
      <button class="bnav-item" aria-label="لوحة القيادة">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>لوحة القيادة</span>
      </button>
      <button class="bnav-item" aria-label="التقارير">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>التقارير</span>
      </button>
      <button class="bnav-item bnav-home" aria-label="الرئيسية">
        <div class="bnav-home-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <span>الرئيسية</span>
      </button>
      <button class="bnav-item" aria-label="المزيد">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        <span>المزيد</span>
      </button>
      <button class="bnav-item" aria-label="الإعدادات">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>الإعدادات</span>
      </button>
    </nav>

  </div>

  <div class="loading hidden" id="loading">
    <div class="loading-inner">
      <div class="loader-ring"></div>
      <p class="loading-title">سندباد يحلل البيانات</p>
      <ul class="loading-steps" id="loadingSteps"></ul>
      <div class="loading-bar"><div class="loading-bar-fill" id="loadingBar"></div></div>
    </div>
  </div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
